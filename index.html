<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Laptop 24h - Quản lý</title>
<link rel="stylesheet" href="styles/main.css" />
</head>
<body>

<!-- Màn hình đăng nhập -->
<div id="auth-screen" class="screen">
<div class="login-box">
<h2>Laptop 24h</h2>
<input id="auth-email" type="text" placeholder="Tên đăng nhập" autocomplete="username" />
<div style="position:relative;margin-bottom:8px">
<input id="auth-pass" type="password" placeholder="Mật khẩu" autocomplete="current-password" style="margin-bottom:0;padding-right:44px" />
<button id="auth-show" type="button" tabindex="-1" title="Hiện/ẩn mật khẩu" style="position:absolute;right:6px;top:0;bottom:0;width:auto!important;min-width:0;margin:0;display:flex;align-items:center;justify-content:center;background:none!important;border:none!important;box-shadow:none!important;cursor:pointer;font-size:17px;padding:0 8px;color:#666">👁</button>
</div>
<select id="auth-branch" style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:6px;font-size:15px;margin-bottom:8px;color:#333;background:#fff;cursor:pointer">
  <option value="vinhlong">📍 Vĩnh Long</option>
  <option value="cantho">📍 Cần Thơ</option>
</select>
<label style="display:flex;align-items:center;gap:6px;font-size:13px;color:#555;margin:0 0 10px;cursor:pointer;user-select:none"><input id="auth-remember" type="checkbox" style="width:auto;margin:0;cursor:pointer" /> Ghi nhớ mật khẩu</label>
<button id="auth-btn">Đăng nhập</button>
<p id="auth-err" class="error"></p>
</div>
</div>

<!-- Giao diện chính -->
<div id="app" class="screen hidden">
<nav id="sidebar">
<div class="logo">Laptop 24h</div>
<div id="branch-label" style="font-size:12px;color:rgba(255,255,255,0.75);padding:0 16px 8px;margin-top:-6px;letter-spacing:0.3px;"></div>
<ul id="nav-links">
<li><a href="#repairs">🔧 Phiếu sửa chữa</a></li>
<li><a href="#sales">🖥️ Bán hàng</a></li>
<li><a href="#inventory">📦 Kho hàng</a></li>
<li><a href="#customers">👥 Khách hàng</a></li>
<li><a href="#debts">💰 Công nợ</a></li>
<li><a href="#stats">📊 Thống kê</a></li>
<li><a href="#warranty">🛡️ Bảo hành</a></li>
<li class="admin-only"><a href="#services">🧰 Dịch vụ</a></li>
<li class="admin-only"><a href="#users">👨‍💼 Nhân viên</a></li>
<li class="admin-only"><a href="#settings">⚙️ Cài đặt &amp; Ứng dụng</a></li>
</ul>
<div class="sidebar-footer">
<span id="user-name"></span>
<button id="logout-btn">Đăng xuất</button>
</div>
</nav>
<main id="main-content"></main>
</div>

<!-- Toast notifications -->
<div id="toast-container"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

<!-- App bootstrap (ES module) -->
<script type="module" src="app.js?v=146"></script>
</body>
</html>
