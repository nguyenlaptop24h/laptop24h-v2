<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Laptop 24h - Quan ly</title>
<link rel="stylesheet" href="styles/main.css" />
</head>
<body>

<!-- Man hinh dang nhap -->
<div id="auth-screen" class="screen">
<div class="login-box">
<h2>Laptop 24h</h2>
<input id="auth-email" type="text" placeholder="Ten dang nhap" autocomplete="username" />
<input id="auth-pass" type="password" placeholder="Mat khau" autocomplete="current-password" />
<select id="auth-branch" style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:6px;font-size:15px;margin-bottom:8px;color:#333;background:#fff;cursor:pointer">
  <option value="vinhlong">📍 Vinh Long</option>
  <option value="cantho">📍 Can Tho</option>
</select>
<button id="auth-btn">Dang nhap</button>
<p id="auth-err" class="error"></p>
</div>
</div>

<!-- Giao dien chinh -->
<div id="app" class="screen hidden">
<nav id="sidebar">
<div class="logo">Laptop 24h</div>
<div id="branch-label" style="font-size:12px;color:rgba(255,255,255,0.75);padding:0 16px 8px;margin-top:-6px;letter-spacing:0.3px;"></div>
<ul id="nav-links">
<li><a href="#repairs">🔧 Phieu sua chua</a></li>
<li><a href="#sales">🖥 Ban hang</a></li>
<li><a href="#inventory">📦 Kho hang</a></li>
<li><a href="#customers">👥 Khach hang</a></li>
<li><a href="#debts">💰 Cong no</a></li>
<li><a href="#stats">📊 Thong ke</a></li>
<li class="admin-only"><a href="#users">👨‍💼 Nhan vien</a></li>
<li class="admin-only"><a href="#settings">⚙️ Cai dat &amp; Ung dung</a></li>
</ul>
<div class="sidebar-footer">
<span id="user-name"></span>
<button id="logout-btn">Dang xuat</button>
</div>
</nav>
<main id="main-content"></main>
</div>

<!-- Toast notifications -->
<div id="toast-container"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<!-- App bootstrap -->
<script type="module" src="app.js?v=83"></script>
</body>
</html>
